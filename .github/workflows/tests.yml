# Peanut Testing Protocol v2 — FormFlow (Pro) test + security gate.
#
# Layered "nets" enforced here:
#   Net 2 (security)  — composer audit (non-blocking; ratchet to blocking later)
#                       + gitleaks secret scan; fail-fast on the job.
#   Net 6 (property)  — tests/Property  (pure, WordPress-free invariants).
#   Net 7 (contract)  — tests/Contract  (tester-bridge scenario-manifest shape).
#   Net 1 (floor)     — coverage gate over the property/contract-covered modules.
#   CLASS-007         — semgrep PHP foot-gun gate (BLOCKING) from the #38 sweep.
#
# Blocking gate = static-and-security + class-007 + property + contract + regression.
# The legacy Unit + Integration suites run NON-BLOCKING: the Analytics handoff/
# touch tests carry pre-existing $wpdb-mock test-quality debt (they were dormant
# behind a missing wp_salt()/ARRAY_A bootstrap stub and only began executing once
# that was fixed). Tracked in known-gaps.md; promote Unit to blocking once repaired.
#
# PHP is pinned to 8.3 (the ecosystem CI baseline). The local dev toolchain runs
# PHP 8.5, where ReflectionMethod::setAccessible() emits a deprecation that trips
# beStrictAboutOutputDuringTests — that noise does not occur on 8.3.
#
# The trigger intentionally fires on every PR (no path filter): the testing gate
# must never be skipped just because a change touched only test files or config.
name: tests

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  class-007:
    name: Static Analysis / Security (CLASS-007)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install semgrep
        run: pip install --quiet semgrep

      # CLASS-007 foot-gun gate. The repo is clean (0 findings); this step is
      # BLOCKING so any newly-introduced empty()-coercion on superglobal input
      # or negative-length substr fails CI. Intentional exceptions must carry a
      # `// nosemgrep: <rule-id>` annotation with justification.
      - name: Semgrep PHP foot-gun rules (CLASS-007)
        run: semgrep --config .peanut/static-rules/peanut-php-footguns.yml includes/ public/ --error

  static-and-security:
    name: Static + Security (Net 2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      # Net 2: dependency vulnerability audit. Non-blocking for now (|| true) so a
      # newly-published advisory doesn't wall the team overnight; ratchet to
      # blocking (drop the `|| true`) once the team is watching it.
      - name: Dependency audit (composer audit)
        run: composer audit || true

      # Net 2: secret scan. This one IS fail-fast — a committed secret should
      # block the merge. We run the FREE gitleaks CLI (the gitleaks-action@v2
      # requires a paid GITLEAKS_LICENSE for org repos). Allowlist for the
      # documented example placeholders lives in .gitleaks.toml.
      - name: Secret scan (gitleaks)
        uses: gacts/gitleaks@v1
        with:
          config: .gitleaks.toml

  php-tests:
    name: Property + Contract + Coverage gate
    runs-on: ubuntu-latest
    env:
      # Real measured coverage of the property/contract-covered modules is
      # ~20.5%. Floor set under it with ratchet headroom. Raise as coverage grows.
      MIN_COVERAGE: "15"
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP (with pcov)
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: pcov
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      # Net 6 + Net 7 — the blocking gate. These suites are pure / WordPress-free
      # and must stay green.
      - name: Property tests (Net 6)
        run: vendor/bin/phpunit --testsuite=property

      - name: Contract tests (Net 7)
        run: vendor/bin/phpunit --testsuite=contract

      - name: Regression tests
        run: vendor/bin/phpunit --testsuite=regression

      # Net 1 — coverage floor over the property/contract-covered modules.
      - name: Coverage (property + contract) → Clover
        run: vendor/bin/phpunit -c phpunit.coverage.xml

      - name: Coverage gate
        run: php scripts/coverage-gate.php coverage/clover.xml "$MIN_COVERAGE"

      # Legacy suites — non-blocking until the analytics $wpdb-mock debt is repaired.
      - name: Unit tests (non-blocking — see known-gaps.md)
        continue-on-error: true
        run: vendor/bin/phpunit --testsuite=unit

      - name: Integration tests (non-blocking until infra wired)
        continue-on-error: true
        run: vendor/bin/phpunit --testsuite=integration

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: php-coverage
          path: coverage/
